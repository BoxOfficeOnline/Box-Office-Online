# .github/workflows/mysql-deploy.yml
name: Deploy to Azure MySQL

on:
  push:
    branches:
      - main # Restricts deployment to the main branch

# Required for Azure OIDC authentication
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest # Changed to ubuntu-latest for speed/cost, but windows-latest is fine too
    steps:
    - uses: actions/checkout@v4 # Upgraded to v4
    
    - name: Install/Update Azure CLI
      run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
      
    - uses: azure/login@v1
      with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          
    - uses: azure/mysql@v1
      with:
        server-name: box-office-online
        username: admin
        password: ${{ secrets.AZURE_MYSQL_PASSWORD }}
        database: box-office-online
        sql-file: './data.sql'
