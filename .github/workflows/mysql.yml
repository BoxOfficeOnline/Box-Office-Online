# .github/workflows/mysql-deploy.yml
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v1
    - uses: azure/login@v1
      with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - uses: azure/mysql@v1
      with:
        server-name: box-office-online
        username: admin@box-office-online
        password: ${{ secrets.AZURE_MYSQL_PASSWORD }}
        # This is optional, you want to connect directly
        database: box-office-online
        sql-file: './data.sql'


